<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinecone Education — Thank You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="styles.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pine:  { DEFAULT: '#2d4a3e', light: '#3d6355', dark: '#1e3329' },
            cone:  { DEFAULT: '#c4732a', light: '#e8955a' },
            cream: '#faf6ee',
            mist:  '#eae4d8',
            bark:  '#7a6551',
          },
          fontFamily: {
            heading: ['"Baloo 2"', 'system-ui', 'sans-serif'],
            body:    ['"Comic Neue"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-body bg-cream text-[#1e2b26] flex flex-col min-h-screen leading-relaxed">

  <!-- ── Navbar ── -->
  <nav class="bg-pine shadow-lg" role="navigation" aria-label="Main navigation">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="home.html" class="font-heading font-bold text-xl text-white tracking-wide rounded focus-visible:outline-2 focus-visible:outline-cone focus-visible:outline-offset-2">
          Pinecone <span class="text-cone-light">Education</span>
        </a>
        <a href="home.html" class="inline-flex items-center gap-1.5 bg-cone hover:bg-cone-light text-white text-sm font-bold px-5 py-2 rounded-full transition-colors duration-200 cursor-pointer focus-visible:outline-2 focus-visible:outline-white focus-visible:outline-offset-2">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Home
        </a>
      </div>
    </div>
  </nav>

  <!-- ── Centered success card ── -->
  <main class="flex-grow flex items-center justify-center py-16 px-4" role="main">
    <div class="bg-white border border-mist rounded-2xl shadow-md p-10 md:p-14 text-center w-full max-w-md">

      <!-- Check circle icon -->
      <div class="flex justify-center mb-6" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-16 h-16 text-green-500">
          <path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd"/>
        </svg>
      </div>

      <h1 class="font-heading font-bold text-pine text-3xl mb-3">Thank you!</h1>
      <p class="text-[#5a6b64] mb-8 leading-relaxed">Your message has been sent. I'll review your note and follow up within 24 hours.</p>

      <a href="home.html" class="inline-flex items-center justify-center gap-2 bg-cone hover:bg-cone-light text-white font-bold text-base px-7 py-3.5 rounded-full transition-colors duration-200 cursor-pointer focus-visible:outline-2 focus-visible:outline-cone focus-visible:outline-offset-2">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Return to home
      </a>
    </div>
  </main>

  <!-- ── Footer ── -->
  <footer class="bg-[#1e2b26] text-white/60 py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <p class="text-sm">&copy; 2025 Pinecone Education · Westminster, CO ·
        <a href="mailto:noahliska@outlook.com" class="text-cone-light hover:text-white transition-colors duration-200">noahliska@outlook.com</a>
      </p>
    </div>
  </footer>

</body>
</html>
